services:
  postgres:
    image: postgres:16
    container_name: taskinator-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - taskinator_pgdata:/var/lib/postgresql/data

volumes:
  taskinator_pgdata: